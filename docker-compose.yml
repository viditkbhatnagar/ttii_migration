services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ttii}
      MYSQL_USER: ${MYSQL_USER:-ttii}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ttii_dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ttii_root_password}
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD']
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: development
      API_HOST: 0.0.0.0
      API_PORT: ${API_PORT:-4000}
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ttii}
      MYSQL_USER: ${MYSQL_USER:-ttii}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ttii_dev_password}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '${API_PORT:-4000}:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    environment:
      WEB_PORT: ${WEB_PORT:-5173}
      VITE_API_BASE_URL: http://localhost:${API_PORT:-4000}/api
    depends_on:
      - api
    ports:
      - '${WEB_PORT:-5173}:5173'

volumes:
  mysql-data:
